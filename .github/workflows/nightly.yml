# Build and publish nightly releases for Linux, Mac, and Windows
name: Nightly Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:   # allows manual trigger from the Actions tab

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Liberica Full with JavaFX)
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Build Linux and Mac releases
        uses: gradle/gradle-build-action@v2
        with:
          arguments: runtimeZipOthers -PprojectVersion=nightly

      - name: Build Windows release
        uses: gradle/gradle-build-action@v2
        with:
          arguments: runtimeZipWindows -PprojectVersion=nightly

      - name: Create build info file
        run: |
          echo -e "ref: $GITHUB_REF \ncommit: $GITHUB_SHA\nbuild: $(date +"%Y-%m-%dT%H:%M:%SZ")" > build/image/build_info.txt

      - name: Publish to nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          prerelease: true
          files: |
            build/image/*.zip
            build/image/build_info.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
