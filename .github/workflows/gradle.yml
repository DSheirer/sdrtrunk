# This workflow builds the sdrtrunk Java project with Gradle and the
# HydraSDR native JNI library with CMake on all supported platforms.

name: Java CI with Gradle

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev ninja-build

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb ninja

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install -y ninja
        shell: pwsh

      # Workaround for libhydrasdr's CMakeLists.txt bug on Windows: it downloads
      # libusb-1.0.29.7z and extracts it via `cmake -E tar`, which cannot decode
      # LZMA2 ("Unexpected codec ID: a"). We pre-extract the same archive into
      # the location libhydrasdr expects so its FetchContent step finds the file
      # already present and skips the broken extraction.
      - name: Pre-extract libusb for Windows
        if: runner.os == 'Windows'
        run: |
          # Workaround for libhydrasdr's CMakeLists.txt: it downloads
          # libusb-1.0.29.7z and extracts via `cmake -E tar`, which fails to
          # decode LZMA2 ("Unexpected codec ID: a"). Pre-extract here using
          # 7z.exe (preinstalled on windows-latest) into the path libhydrasdr's
          # FetchContent expects so its broken extraction step is bypassed.
          # NOTE: the .7z archive has no top-level dir - its contents are
          # VS2022/, MinGW64/, etc. - so we must extract INTO libusb-1.0.29/.
          $libusbDir = "jni/build/_deps/libusb-1.0.29"
          New-Item -ItemType Directory -Force -Path $libusbDir | Out-Null
          Invoke-WebRequest -Uri "https://github.com/libusb/libusb/releases/download/v1.0.29/libusb-1.0.29.7z" -OutFile "libusb.7z"
          & "C:\Program Files\7-Zip\7z.exe" x libusb.7z -o"$libusbDir" -y
          if (-not (Test-Path "$libusbDir/VS2022/MS64/dll/libusb-1.0.dll")) {
            Write-Error "libusb pre-extraction failed: expected DLL not found"
            exit 1
          }
          Remove-Item libusb.7z
        shell: pwsh

      - name: Build HydraSDR JNI native library
        run: |
          mkdir -p jni/build
          cd jni/build
          cmake ../ -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
        shell: bash

      - name: Verify native libraries
        run: |
          echo "=== JNI build output ==="
          ls -la jni/build/ 2>/dev/null || true
        shell: bash

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: clean build
